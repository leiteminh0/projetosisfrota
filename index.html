<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sifrota Web Management</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sifrota Web Management</span>
        </div>
    </nav>

    <div class="container my-4">
        <h1 class="mb-4">Gestão</h1>

        <ul class="nav nav-tabs" id="myTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-marcas" data-bs-toggle="tab" data-bs-target="#pane-marcas" type="button" role="tab" aria-controls="pane-marcas" aria-selected="true">🏢 Marcas</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-modelos" data-bs-toggle="tab" data-bs-target="#pane-modelos" type="button" role="tab" aria-controls="pane-modelos" aria-selected="false">🚘 Modelos</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-veiculos" data-bs-toggle="tab" data-bs-target="#pane-veiculos" type="button" role="tab" aria-controls="pane-veiculos" aria-selected="false">🚚 Veículos</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabsContent">
            <!-- MARCAS -->
            <div class="tab-pane fade show active pt-4" id="pane-marcas" role="tabpanel" aria-labelledby="tab-marcas">
                <div class="d-flex justify-content-between mb-3">
                    <h2 class="h4">Gestão de Marcas</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="window.location.reload()">Novo / Limpar</button>
                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalMarca">Nova Marca</button>
                    </div>
                </div>
                <table class="table table-striped shadow-sm bg-white">
                    <thead><tr><th>ID</th><th>Nome</th><th>Ações</th></tr></thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>

            <!-- MODELOS -->
            <div class="tab-pane fade pt-4" id="pane-modelos" role="tabpanel" aria-labelledby="tab-modelos">
                <div class="d-flex justify-content-between mb-3">
                    <h2 class="h4">Gestão de Modelos</h2>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalModelo">Novo Modelo</button>
                </div>
                <table class="table table-striped shadow-sm bg-white">
                    <thead><tr><th>ID</th><th>Nome</th><th>Ações</th></tr></thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>

            <!-- VEÍCULOS -->
            <div class="tab-pane fade pt-4" id="pane-veiculos" role="tabpanel" aria-labelledby="tab-veiculos">
                <div class="d-flex justify-content-between mb-3">
                    <h2 class="h4">Gestão de Veículos</h2>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="window.location.reload()">Novo / Limpar</button>
                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalVeiculo">Abrir Formulário</button>
                    </div>
                </div>

                <table class="table table-striped card shadow-sm bg-white">
                    <thead><tr><th>Descrição</th><th>Ano</th><th>Ações</th></tr></thead>
                    <tbody id="tabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL MARCA -->
    <div class="modal fade" id="modalMarca" tabindex="-1">
        <div class="modal-dialog">
            <form id="formMarca" class="modal-content">
                <div class="modal-header"><h5 id="modalTitulo">Nova Marca</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="idField">
                    <input type="text" id="nomeField" class="form-control" placeholder="Nome da Marca" required>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Salvar no Xano</button></div>
            </form>
        </div>
    </div>

    <!-- MODAL MODELO -->
    <div class="modal fade" id="modalModelo" tabindex="-1">
        <div class="modal-dialog">
            <form id="formModelo" class="modal-content">
                <div class="modal-header"><h5 id="modalTitulo">Novo Modelo</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="idField">
                    <input type="text" id="nomeField" class="form-control" placeholder="Nome do Modelo" required>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Salvar no Xano</button></div>
            </form>
        </div>
    </div>

    <!-- MODAL VEÍCULO -->
    <div class="modal fade" id="modalVeiculo" tabindex="-1">
        <div class="modal-dialog">
            <form id="formVeiculo" class="modal-content">
                <div class="modal-body">
                    <input type="hidden" id="idV">
                    <input type="text" id="descV" class="form-control mb-2" placeholder="Descrição" required>
                    <select id="selMarca" class="form-select mb-2" required></select>
                    <select id="selModelo" class="form-select mb-2" required></select>
                    <input type="number" id="anoV" class="form-control mb-2" placeholder="Ano" required>
                    <input type="number" id="horiV" class="form-control mb-2" placeholder="Horímetro" required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary w-100">Salvar no Xano (POST/PATCH)</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Controllers (usam os mesmos ids que existiam nas páginas separadas) -->
    <script type="module" src="js/controllers/marcaController.js"></script>
    <script type="module" src="js/controllers/modeloController.js"></script>
    <script type="module" src="js/controllers/veiculoController.js"></script>
</body>
</html>
